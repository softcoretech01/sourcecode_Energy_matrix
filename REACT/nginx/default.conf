server {
    listen 80;
    server_name _;

    # React Frontend at /energymatrix
    location /energymatrix {
        alias /usr/share/nginx/html/energymatrix/;
        try_files $uri $uri/ /energymatrix/index.html;
    }

    # Proxy API calls directly if needed
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static uploads folder from FastAPI
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
