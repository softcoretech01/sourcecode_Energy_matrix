server {
    listen 80;
    server_name softcoretech.in www.softcoretech.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name softcoretech.in www.softcoretech.in;

    ssl_certificate /etc/letsencrypt/live/softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/softcoretech.in/privkey.pem;

    # 1. FIX: Match the path from your screenshot
    location /energymatrix/uat/api/ {
        # The trailing slash here is important! 
        # It strips '/energymatrix/uat/api/' and passes the rest to the backend
        proxy_pass http://backend:8000/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. React Frontend
    location /energymatrix/uat/ {
        alias /usr/share/nginx/html/energymatrix/uat/;
        index index.html;
        try_files $uri $uri/ /energymatrix/uat/index.html;
    }

    # 3. Static Uploads (if used)
    location /energymatrix/uat/uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
    }

    # 4. Root Redirect
    location = / {
        return 301 /energymatrix/uat/;
    }
}
